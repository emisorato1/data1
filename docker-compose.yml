# ==============================================================================
# Docker Compose — Desarrollo local
# Servicios base: PostgreSQL 16 + pgvector, Redis 7, Backend FastAPI, Frontend Next.js
# Servicios opcionales (via profiles):
#   --profile airflow  → Airflow 3 local para desarrollo de DAGs
#   --profile pgadmin  → pgAdmin 4 para consultas SQL via web
# Langfuse se usa del cluster K8s compartido (ver .env.example)
# ==============================================================================

services:
  # ============================================================================
  # PostgreSQL 16 + pgvector
  # ============================================================================
  db:
    image: pgvector/pgvector:pg16
    container_name: rag-db
    ports:
      - "5432:5432"
    command: >
      postgres
      -c tcp_keepalives_idle=60
      -c tcp_keepalives_interval=10
      -c tcp_keepalives_count=5
    environment:
      POSTGRES_DB: ${DB_NAME:-rag_db}
      POSTGRES_USER: ${DB_USER:-raguser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-raguser} -d ${DB_NAME:-rag_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ============================================================================
  # Redis 7
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: rag-redis
    ports:
      - "6379:6379"
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================================================================
  # Backend FastAPI — API REST del sistema RAG
  # Uso: docker compose up (arranca automaticamente con db y redis)
  # API: http://localhost:8000
  # Health: http://localhost:8000/health
  # ============================================================================
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: rag-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Sobreescribir URLs para usar nombres de servicio Docker (no localhost)
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-raguser}:${DB_PASSWORD:?DB_PASSWORD is required}@db:5432/${DB_NAME:-rag_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379/0
      # Trusted hosts: incluir nombre de servicio Docker para comunicacion interna
      TRUSTED_HOSTS: localhost,127.0.0.1,backend
      CORS_ORIGINS: http://localhost:3000,http://frontend:3000
      # Credenciales GCP (ADC montado desde el host)
      GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcloud/adc.json
      # Opcional: proyecto de cuota para eliminar UserWarning de ADC de usuario
      GCP_QUOTA_PROJECT_ID: ${GCP_QUOTA_PROJECT_ID:-}
    volumes:
      - ~/.config/gcloud/application_default_credentials.json:/tmp/gcloud/adc.json:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1024M
        reservations:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ============================================================================
  # Airflow 3 — Desarrollo local de DAGs (activar con --profile airflow)
  # Uso: docker compose --profile airflow up
  # UI: http://localhost:8080 (credenciales en stdout del primer arranque)
  #
  # NOTA: Airflow 3.0.x usa SQLAlchemy 1.4.x internamente. Las dependencias
  # extra se instalan sin tocar SQLAlchemy para no romper el ORM de Airflow.
  # El DAG rag_indexing (T3-S2-03) usa los componentes de src/ directamente
  # con sync psycopg para DB y asyncio.run() para el Gemini embedding SDK.
  # ============================================================================
  airflow:
    image: apache/airflow:3.0.6-python3.12
    container_name: rag-airflow
    deploy:
      resources:
        limits:
          memory: 4096M
    profiles:
      - airflow
    ports:
      - "8080:8080"
    environment:
      # --- Airflow core config ---
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__TEST_CONNECTION: "Enabled"
      # --- Webserver ---
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      AIRFLOW__WEBSERVER__WARN_DEPLOYMENT_EXPOSURE: "false"
      # --- Conexion a la PG de la app (para que los DAGs accedan a rag_db) ---
      AIRFLOW_CONN_RAG_DB: postgresql://${DB_USER:-raguser}:${DB_PASSWORD:?DB_PASSWORD is required}@db:5432/${DB_NAME:-rag_db}
      # --- Variables para los DAGs (IndexingService, embeddings, etc.) ---
      DATABASE_URL: postgresql+psycopg://${DB_USER:-raguser}:${DB_PASSWORD:?DB_PASSWORD is required}@db:5432/${DB_NAME:-rag_db}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      USE_VERTEX_AI: ${USE_VERTEX_AI:-true}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-}
      GCP_LOCATION: ${GCP_LOCATION:-us-central1}
      GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcloud/adc.json
      JWT_SECRET: ${JWT_SECRET:-airflow-local-dev-jwt-secret-not-for-production}
      # --- PYTHONPATH para importar src/ ---
      PYTHONPATH: /opt/airflow
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src:ro
      - ./data:/opt/airflow/data:ro
      - ./tests/data/demo:/opt/airflow/data/demo # Carpeta de archivos/documentos de demo
      - airflow-logs:/opt/airflow/logs
      - ~/.config/gcloud/application_default_credentials.json:/tmp/gcloud/adc.json:ro
    entrypoint: /bin/bash
    command:
      - -c
      - |
        echo "=== Installing project dependencies (Airflow-compatible) ===" \
        && pip install --no-cache-dir -q \
          "psycopg[binary]>=3.2.0" \
          "pgvector>=0.3.6" \
          "pydantic-settings>=2.6.0" \
          "langfuse>=2.50.0" \
          "ragas>=0.4.3" \
          "pymupdf>=1.27.1" \
          "python-docx>=1.2.0" \
          "tiktoken>=0.7.0" \
          "langchain-text-splitters>=0.3.0" \
          "google-genai>=1.0.0" \
          "tenacity>=8.2.0" \
          "numpy>=1.26.0" \
        && echo "=== Pre-caching tiktoken encoding (offline) ===" \
        && python -c "import tiktoken; tiktoken.get_encoding('cl100k_base')" \
        && echo "=== Initializing Airflow DB ===" \
        && airflow db migrate \
        && echo "=== Creating admin user ===" \
        && airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname Local \
          --role Admin \
          --email admin@rag.local 2>/dev/null || true \
        && echo "=== Starting Airflow standalone (background) ===" \
        && airflow standalone &
        AIRFLOW_PID=$$!

        echo "=== Waiting for Airflow to be ready ===" \
        && MAX_RETRIES=40 \
        && RETRY_INTERVAL=5 \
        && for i in $$(seq 1 $$MAX_RETRIES); do
          if curl -sf http://localhost:8080/api/v2/monitor/health > /dev/null 2>&1; then
            echo "=== Airflow is ready (attempt $$i/$$MAX_RETRIES) ==="
            break
          fi
          echo "... Airflow not ready yet (attempt $$i/$$MAX_RETRIES), retrying in $${RETRY_INTERVAL}s"
          sleep $$RETRY_INTERVAL
        done

        if curl -sf http://localhost:8080/api/v2/monitor/health > /dev/null 2>&1; then
          echo "=== Unpausing DAG load_demo_data ==="
          airflow dags unpause load_demo_data || true

          echo "=== Auto-triggering DAG load_demo_data ==="
          airflow dags trigger load_demo_data \
            --conf '{"folder_path": "data/demo/", "skip_existing": true}' \
            || echo "WARNING: Failed to trigger load_demo_data DAG"
        else
          echo "WARNING: Airflow did not become healthy in time, skipping auto-trigger"
        fi

        wait $$AIRFLOW_PID
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/v2/monitor/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped

  # ============================================================================
  # Frontend Next.js — UI del chat
  # UI: http://localhost:3000
  # Requiere backend corriendo en localhost:8000 (o servicio app en compose)
  # ============================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
      args:
        NEXT_PUBLIC_BACKEND_URL: http://localhost:8000
    container_name: rag-frontend
    ports:
      - "3000:3000"
    environment:
      # Client-side (browser): URL directa del backend para SSE streaming
      NEXT_PUBLIC_BACKEND_URL: http://localhost:8000
      # Server-side (Route Handler proxy): acceso container-to-container
      BACKEND_INTERNAL_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ============================================================================
  # pgAdmin 4 — Consultas SQL via web (activar con --profile pgadmin)
  # Uso: docker compose --profile pgadmin up -d
  # UI: http://localhost:5050
  # Login: admin@rag.local / admin (configurable abajo)
  # La conexion a PostgreSQL se registra automaticamente via servers.json
  # ============================================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: rag-pgadmin
    profiles:
      - pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@rag.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      - ./scripts/pgadmin-servers.json:/pgadmin4/servers.json:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
    driver: local
  airflow-logs:
    driver: local
  pgadmin-data:
    driver: local
